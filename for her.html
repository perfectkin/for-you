<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apology Card</title>
    <link rel="stylesheet" href="for her.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="card-top">
                <span class="heart">💖</span>
                <h1>to my little princess</h1>
            </div>
            <p class="intro">I tried to create a message for you, my little girl. Read it carefully and let me know what you think, okay babe?</p>
            <div id="message">Tap the button to see the full message.</div>
            <button onclick="nextMessage()">Read my apology</button>
            <p class="footer">You are my world, Aya. I love you so much.</p>
        </div>
    </div>
    <script src="for her.js"></script>
</body>
</html>
